[Hardware]
radar_cfg_file = core/radar/config.cfg      # Path to the Texas Instruments mmWave configuration file
cli_port = auto                             # Leave as "auto" to auto-detect, or specify exactly (COM for windows, tty for linux)
data_port = auto                            # Leave as "auto" to auto-detect, or specify exactly (COM for windows, tty for linux)

[Network]
zmq_radar_port = 5555       # ZeroMQ port for radar data
zmq_camera_port = 5556      # ZeroMQ port for camera feed

[Recording]
chunk_size = 50             # Number of frames per recording chunk (adjust based on memory and performance needs)

[Viewer]
default_ip = 127.0.0.1      # Default IP address of the Publisher (use 127.0.0.1 if on the same machine)
max_range_m = 5.0           # Maximum distance to display on the Y-axis (in meters)
cmap = inferno              # Colormap for the heatmap (options: inferno, viridis, plasma, magma, turbo)
low_pct = 40.0              # Noise floor percentile (0 to 100) - hides background static
high_pct = 99.5             # Clipping percentile (0 to 100) - prevents outliers from dominating the color scale    
smooth_grid_size = 250      # Grid size for bilinear upscaling

[Camera]
width = 640
height = 480
fps = 30
model_complexity = 1        # MediaPipe model complexity (0 = Fast/Lite, 1 = Normal, 2 = Heavy/Accurate)
jpeg_quality = 80           # JPEG compression quality (0 to 100)
auto_exposure = False       # Whether to enable auto-exposure
exposure = 500              # Manual exposure value (if auto_exposure is False)